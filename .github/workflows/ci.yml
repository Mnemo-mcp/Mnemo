name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Cache ONNX model
        uses: actions/cache@v4
        with:
          path: ~/.cache/mnemo/models/all-MiniLM-L6-v2
          key: onnx-all-MiniLM-L6-v2

      - name: Download ONNX model
        run: |
          mkdir -p ~/.cache/mnemo/models/all-MiniLM-L6-v2
          cd ~/.cache/mnemo/models/all-MiniLM-L6-v2
          [ -f tokenizer.json ] || curl -sfSL --retry 3 https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/main/tokenizer.json -o tokenizer.json
          [ -f model.onnx ] || curl -sfSL --retry 3 https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/main/onnx/model.onnx -o model.onnx

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest

      - name: Build package
        run: python -m build
