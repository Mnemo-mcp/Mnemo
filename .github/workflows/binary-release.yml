name: Binary Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: mnemo-darwin-arm64
          - os: ubuntu-latest
            artifact: mnemo-linux-x64
          - os: windows-latest
            artifact: mnemo-win-x64.exe
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build binary
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[binary]"
          pyinstaller pyinstaller.spec

      - name: Rename artifact
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/mnemo.exe dist/${{ matrix.artifact }}
          else
            mv dist/mnemo dist/${{ matrix.artifact }}
            chmod +x dist/${{ matrix.artifact }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}
