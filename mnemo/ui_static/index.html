<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mnemo — Code Intelligence</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/force-graph"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --border: #1e1e2e;
  --text: #e0e0e0;
  --dim: #888;
  --accent: #00ff88;
  --accent2: #00ccff;
  --class-color: #ff6b6b;
  --fn-color: #4ecdc4;
  --file-color: #ffe66d;
  --community-color: #a855f7;
}
body { background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', 'SF Mono', monospace; }
#app { display: flex; height: 100vh; }
.sidebar { width: 320px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
.sidebar-header h1 { font-size: 18px; color: var(--accent); margin-bottom: 4px; }
.sidebar-header .subtitle { font-size: 11px; color: var(--dim); }
.search-box { width: 100%; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: inherit; font-size: 12px; margin-top: 10px; }
.search-box:focus { outline: none; border-color: var(--accent); }
.stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
.stat { text-align: center; }
.stat-value { font-size: 18px; font-weight: bold; color: var(--accent); }
.stat-label { font-size: 10px; color: var(--dim); text-transform: uppercase; }
.tab-bar { display: flex; border-bottom: 1px solid var(--border); }
.tab { flex: 1; padding: 8px; text-align: center; font-size: 11px; cursor: pointer; color: var(--dim); border-bottom: 2px solid transparent; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab:hover { color: var(--text); }
.list { flex: 1; overflow-y: auto; padding: 8px; }
.list-item { padding: 8px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-bottom: 2px; }
.list-item:hover { background: var(--border); }
.list-item .name { color: var(--text); }
.list-item .meta { color: var(--dim); font-size: 10px; margin-top: 2px; }
.badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 9px; margin-right: 4px; }
.badge-class { background: rgba(255,107,107,0.2); color: var(--class-color); }
.badge-function { background: rgba(78,205,196,0.2); color: var(--fn-color); }
.badge-community { background: rgba(168,85,247,0.2); color: var(--community-color); }
.main { flex: 1; position: relative; }
#graph-container { width: 100%; height: 100%; }
.detail-panel { position: absolute; top: 16px; right: 16px; width: 300px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; display: none; max-height: 80vh; overflow-y: auto; }
.detail-panel.visible { display: block; }
.detail-panel h3 { color: var(--accent); margin-bottom: 8px; font-size: 14px; }
.detail-panel .field { margin-bottom: 6px; font-size: 12px; }
.detail-panel .field-label { color: var(--dim); font-size: 10px; }
.method-list { list-style: none; padding: 0; }
.method-list li { padding: 3px 0; font-size: 11px; color: var(--fn-color); }
</style>
</head>
<body>
<div id="app"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const API = '';

function App() {
  const [stats, setStats] = useState(null);
  const [tab, setTab] = useState('communities');
  const [communities, setCommunities] = useState([]);
  const [searchResults, setSearchResults] = useState([]);
  const [searchQuery, setSearchQuery] = useState('');
  const [graphData, setGraphData] = useState({ nodes: [], links: [] });
  const [selectedNode, setSelectedNode] = useState(null);
  const [symbolDetail, setSymbolDetail] = useState(null);
  const graphRef = useRef(null);
  const containerRef = useRef(null);

  useEffect(() => {
    fetch(`${API}/api/stats`).then(r => r.json()).then(setStats);
    fetch(`${API}/api/communities`).then(r => r.json()).then(d => setCommunities(d.communities || []));
    fetch(`${API}/api/graph?limit=300`).then(r => r.json()).then(d => {
      setGraphData({
        nodes: d.nodes.map(n => ({ ...n, color: n.type === 'class' ? '#ff6b6b' : '#4ecdc4' })),
        links: d.edges.map(e => ({ source: e.source, target: e.target, type: e.type }))
      });
    });
  }, []);

  useEffect(() => {
    if (!containerRef.current || graphData.nodes.length === 0) return;
    if (graphRef.current) graphRef.current._destructor();
    
    const graph = ForceGraph()(containerRef.current)
      .graphData(graphData)
      .nodeLabel(n => `${n.name} (${n.type})`)
      .nodeColor(n => n.color || '#888')
      .nodeVal(n => n.type === 'class' ? 4 : 2)
      .linkColor(() => '#333')
      .linkWidth(0.5)
      .backgroundColor('#0a0a0f')
      .onNodeClick(node => {
        setSelectedNode(node);
        fetch(`${API}/api/symbol?name=${node.name}`).then(r => r.json()).then(setSymbolDetail);
      });
    graphRef.current = graph;
  }, [graphData]);

  const doSearch = (q) => {
    setSearchQuery(q);
    if (q.length < 2) { setSearchResults([]); return; }
    fetch(`${API}/api/search?q=${q}`).then(r => r.json()).then(d => setSearchResults(d.results || []));
  };

  return (
    <>
      <div className="sidebar">
        <div className="sidebar-header">
          <h1>⚡ Mnemo</h1>
          <div className="subtitle">Code Intelligence Engine</div>
          <input className="search-box" placeholder="Search symbols..." value={searchQuery} onChange={e => doSearch(e.target.value)} />
        </div>
        {stats && (
          <div className="stats">
            <div className="stat"><div className="stat-value">{stats.files}</div><div className="stat-label">Files</div></div>
            <div className="stat"><div className="stat-value">{stats.classes}</div><div className="stat-label">Classes</div></div>
            <div className="stat"><div className="stat-value">{stats.communities}</div><div className="stat-label">Clusters</div></div>
          </div>
        )}
        <div className="tab-bar">
          <div className={`tab ${tab === 'communities' ? 'active' : ''}`} onClick={() => setTab('communities')}>Communities</div>
          <div className={`tab ${tab === 'search' ? 'active' : ''}`} onClick={() => setTab('search')}>Search</div>
        </div>
        <div className="list">
          {tab === 'communities' && communities.map(c => (
            <div key={c.id} className="list-item">
              <div className="name"><span className="badge badge-community">cluster</span>{c.name}</div>
              <div className="meta">{c.count} classes</div>
            </div>
          ))}
          {tab === 'search' && searchResults.map(r => (
            <div key={r.id} className="list-item" onClick={() => { setSelectedNode(r); fetch(`${API}/api/symbol?name=${r.name}`).then(res => res.json()).then(setSymbolDetail); }}>
              <div className="name"><span className={`badge badge-${r.type}`}>{r.type}</span>{r.name}</div>
              <div className="meta">{r.file}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="main">
        <div id="graph-container" ref={containerRef}></div>
        <div className={`detail-panel ${symbolDetail ? 'visible' : ''}`}>
          {symbolDetail && (
            <>
              <h3>{symbolDetail.name}</h3>
              <div className="field"><span className="field-label">Type:</span> {symbolDetail.type}</div>
              <div className="field"><span className="field-label">File:</span> {symbolDetail.file}</div>
              {symbolDetail.implements && <div className="field"><span className="field-label">Implements:</span> {symbolDetail.implements}</div>}
              {symbolDetail.methods && symbolDetail.methods.length > 0 && (
                <>
                  <div className="field-label" style={{marginTop: 10}}>Methods ({symbolDetail.methods.length}):</div>
                  <ul className="method-list">
                    {symbolDetail.methods.map((m, i) => <li key={i}>.{m.name}()</li>)}
                  </ul>
                </>
              )}
              <button onClick={() => setSymbolDetail(null)} style={{marginTop: 12, padding: '4px 12px', background: 'var(--border)', border: 'none', color: 'var(--text)', borderRadius: 4, cursor: 'pointer'}}>Close</button>
            </>
          )}
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
