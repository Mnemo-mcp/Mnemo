<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mnemo — Code Intelligence</title>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #e0e0e0; font-family: -apple-system, 'SF Mono', monospace; font-size: 13px; }
#app { display: flex; height: 100vh; }
.sidebar { width: 320px; background: #12121a; border-right: 1px solid #1e1e2e; display: flex; flex-direction: column; overflow: hidden; z-index: 10; }
.sidebar-header { padding: 16px; border-bottom: 1px solid #1e1e2e; }
.sidebar-header h1 { font-size: 18px; color: #00ff88; margin-bottom: 4px; }
.sidebar-header .subtitle { font-size: 11px; color: #888; }
.search-box { width: 100%; padding: 8px 12px; background: #0a0a0f; border: 1px solid #1e1e2e; border-radius: 6px; color: #e0e0e0; font-family: inherit; font-size: 12px; margin-top: 10px; outline: none; }
.search-box:focus { border-color: #00ff88; }
.stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 12px 16px; border-bottom: 1px solid #1e1e2e; }
.stat { text-align: center; }
.stat-value { font-size: 20px; font-weight: bold; color: #00ff88; }
.stat-label { font-size: 10px; color: #888; text-transform: uppercase; }
.tab-bar { display: flex; border-bottom: 1px solid #1e1e2e; }
.tab { flex: 1; padding: 10px; text-align: center; font-size: 11px; cursor: pointer; color: #888; border-bottom: 2px solid transparent; }
.tab.active { color: #00ff88; border-bottom-color: #00ff88; }
.tab:hover { color: #e0e0e0; }
.list { flex: 1; overflow-y: auto; padding: 8px; }
.list-item { padding: 8px 10px; border-radius: 4px; cursor: pointer; margin-bottom: 2px; }
.list-item:hover { background: #1e1e2e; }
.list-item .name { font-size: 12px; }
.list-item .meta { color: #888; font-size: 10px; margin-top: 2px; }
.badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 9px; margin-right: 4px; font-weight: 600; }
.badge-class { background: rgba(255,107,107,0.15); color: #ff6b6b; }
.badge-function { background: rgba(78,205,196,0.15); color: #4ecdc4; }
.badge-community { background: rgba(168,85,247,0.15); color: #a855f7; }
.main { flex: 1; position: relative; }
#graph { width: 100%; height: 100%; }
.detail-panel { position: absolute; top: 16px; right: 16px; width: 300px; background: #12121a; border: 1px solid #1e1e2e; border-radius: 8px; padding: 16px; max-height: 80vh; overflow-y: auto; display: none; z-index: 5; }
.detail-panel h3 { color: #00ff88; margin-bottom: 8px; font-size: 14px; }
.detail-panel .field { margin-bottom: 6px; font-size: 12px; }
.detail-panel .field-label { color: #888; font-size: 10px; display: block; }
.method-list { list-style: none; padding: 0; margin-top: 8px; }
.method-list li { padding: 3px 0; font-size: 11px; color: #4ecdc4; }
.close-btn { margin-top: 12px; padding: 4px 12px; background: #1e1e2e; border: none; color: #e0e0e0; border-radius: 4px; cursor: pointer; }
</style>
</head>
<body>
<div id="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>⚡ Mnemo</h1>
      <div class="subtitle">Code Intelligence Engine</div>
      <input class="search-box" id="search-input" placeholder="Search symbols..." />
    </div>
    <div class="stats" id="stats-bar"></div>
    <div class="tab-bar">
      <div class="tab active" data-tab="communities">Communities</div>
      <div class="tab" data-tab="search">Search</div>
    </div>
    <div class="list" id="list-content"></div>
  </div>
  <div class="main">
    <div id="graph"></div>
    <div class="detail-panel" id="detail-panel"></div>
  </div>
</div>
<script>
const API = '';
let network = null;
let currentTab = 'communities';
let communities = [];

// Colors and shapes per type
const TYPE_CONFIG = {
  service:   { color: '#ffe66d', shape: 'diamond', size: 30, font: { color: '#ffe66d', size: 14, bold: true } },
  file:      { color: '#555', shape: 'dot', size: 8, font: { color: '#666', size: 9 } },
  class:     { color: '#ff6b6b', shape: 'dot', size: 16, font: { color: '#ff6b6b', size: 11 } },
  method:    { color: '#4ecdc4', shape: 'dot', size: 6, font: { color: '#4ecdc4', size: 8 } },
  function:  { color: '#4ecdc4', shape: 'triangle', size: 10, font: { color: '#4ecdc4', size: 9 } },
  memory:    { color: '#a855f7', shape: 'star', size: 14, font: { color: '#a855f7', size: 10 } },
  decision:  { color: '#f59e0b', shape: 'star', size: 16, font: { color: '#f59e0b', size: 10, bold: true } },
  community: { color: '#06b6d4', shape: 'square', size: 20, font: { color: '#06b6d4', size: 12, bold: true } },
};

async function init() {
  loadStats();
  loadCommunities();
  loadGraph();
}

async function loadStats() {
  const d = await (await fetch(`${API}/api/stats`)).json();
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat"><div class="stat-value">${d.files}</div><div class="stat-label">Files</div></div>
    <div class="stat"><div class="stat-value">${d.classes}</div><div class="stat-label">Classes</div></div>
    <div class="stat"><div class="stat-value">${d.communities}</div><div class="stat-label">Clusters</div></div>
  `;
}

async function loadCommunities() {
  const d = await (await fetch(`${API}/api/communities`)).json();
  communities = d.communities || [];
  renderList();
}

async function loadGraph() {
  const d = await (await fetch(`${API}/api/graph`)).json();

  const nodes = new vis.DataSet(d.nodes.map(n => {
    const cfg = TYPE_CONFIG[n.type] || TYPE_CONFIG.file;
    return {
      id: n.id,
      label: n.name,
      color: { background: cfg.color, border: cfg.color, highlight: { background: '#fff', border: cfg.color } },
      shape: cfg.shape,
      size: cfg.size,
      font: cfg.font,
      title: `${n.type}: ${n.name}`,
    };
  }));

  const edges = new vis.DataSet(d.edges.map((e, i) => ({
    id: i,
    from: e.source,
    to: e.target,
    color: { color: 'rgba(255,255,255,0.08)', highlight: '#00ff88' },
    width: 0.5,
    smooth: { type: 'continuous' },
  })));

  const container = document.getElementById('graph');
  network = new vis.Network(container, { nodes, edges }, {
    physics: {
      solver: 'forceAtlas2Based',
      forceAtlas2Based: { gravitationalConstant: -30, centralGravity: 0.005, springLength: 100, springConstant: 0.02, damping: 0.4 },
      stabilization: { iterations: 150, fit: true },
    },
    interaction: { hover: true, tooltipDelay: 100, zoomView: true, dragView: true },
    layout: { improvedLayout: true },
    nodes: { borderWidth: 1 },
    edges: { arrows: { to: { enabled: false } } },
  });

  network.on('click', async (params) => {
    if (params.nodes.length > 0) {
      const nodeId = params.nodes[0];
      const node = nodes.get(nodeId);
      const resp = await fetch(`${API}/api/symbol?name=${node.label}`);
      const data = await resp.json();
      showDetail(data);
    }
  });
}

async function doSearch(q) {
  if (q.length < 2) return;
  const d = await (await fetch(`${API}/api/search?q=${encodeURIComponent(q)}`)).json();
  currentTab = 'search';
  updateTabs();
  const el = document.getElementById('list-content');
  el.innerHTML = (d.results || []).map(r => `
    <div class="list-item" onclick="clickSymbol('${r.name}')">
      <div class="name"><span class="badge badge-${r.type}">${r.type}</span>${r.name}</div>
      <div class="meta">${r.file}</div>
    </div>
  `).join('');
}

function renderList() {
  const el = document.getElementById('list-content');
  if (currentTab === 'communities') {
    el.innerHTML = communities.map(c => `
      <div class="list-item">
        <div class="name"><span class="badge badge-community">cluster</span>${c.name}</div>
        <div class="meta">${c.count} classes</div>
      </div>
    `).join('');
  }
}

function updateTabs() {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === currentTab));
}

async function clickSymbol(name) {
  const d = await (await fetch(`${API}/api/symbol?name=${name}`)).json();
  showDetail(d);
}

function showDetail(d) {
  const el = document.getElementById('detail-panel');
  if (!d || !d.name) { el.style.display = 'none'; return; }
  let html = `<h3>${d.name}</h3>`;
  if (d.type) html += `<div class="field"><span class="field-label">Type</span>${d.type}</div>`;
  if (d.file) html += `<div class="field"><span class="field-label">File</span>${d.file}</div>`;
  if (d.implements) html += `<div class="field"><span class="field-label">Implements</span>${d.implements}</div>`;
  if (d.methods && d.methods.length) {
    html += `<span class="field-label">Methods (${d.methods.length})</span><ul class="method-list">`;
    d.methods.forEach(m => { html += `<li>.${m.name}()</li>`; });
    html += '</ul>';
  }
  html += `<button class="close-btn" onclick="document.getElementById('detail-panel').style.display='none'">Close</button>`;
  el.innerHTML = html;
  el.style.display = 'block';
}

// Events
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => { currentTab = t.dataset.tab; updateTabs(); renderList(); });
});
document.getElementById('search-input').addEventListener('input', e => doSearch(e.target.value));

init();
</script>
</body>
</html>
